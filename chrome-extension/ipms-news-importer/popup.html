<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <title>IPMS 导入</title>
    <style>
      body {
        width: 300px;
        margin: 0;
        padding: 12px;
        font: 13px system-ui, sans-serif;
        color: #222;
      }
      label {
        display: block;
        margin-bottom: 4px;
        font-weight: 600;
      }
      input[type="text"] {
        width: 100%;
        box-sizing: border-box;
        padding: 6px 8px;
        border: 1px solid #ccc;
        border-radius: 6px;
      }
      button {
        width: 100%;
        margin-top: 8px;
        padding: 8px 10px;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        font-weight: 600;
      }
      #save {
        background: #f0f0f0;
        color: #333;
      }
      #tab {
        background: #1677ff;
        color: #fff;
      }
      #pick {
        margin-top: 10px;
        font-size: 12px;
        color: #666;
      }
      input[type="file"] {
        width: 100%;
        margin-top: 4px;
      }
      #msg {
        margin-top: 10px;
        font-size: 12px;
        line-height: 1.4;
        white-space: pre-wrap;
        word-break: break-word;
      }
      .ok {
        color: #0a7a2e;
      }
      .err {
        color: #b42318;
      }
    </style>
  </head>
  <body>
    <label for="base">IPMS 根地址（与浏览器登录地址一致）</label>
    <input type="text" id="base" placeholder="http://127.0.0.1:3000" autocomplete="url" />
    <button type="button" id="save">保存</button>
    <hr style="margin: 12px 0; border: none; border-top: 1px solid #eee" />
    <button type="button" id="tab">导入当前标签页（剪藏正文）</button>
    <p id="pick">或选择本地 PDF / Word（与系统管理手工上传一致）</p>
    <input type="file" id="file" accept=".pdf,.docx,application/pdf,application/vnd.openxmlformats-officedocument.wordprocessingml.document" />
    <p id="msg"></p>
    <script src="popup.js"></script>
  </body>
</html>
